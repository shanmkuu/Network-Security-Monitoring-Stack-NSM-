# =============================================================================
# Kibana Configuration — NSM Stack
# =============================================================================

server.name: nsm-kibana
server.host: "0.0.0.0"
server.port: 5601

# Elasticsearch connection (no auth — security disabled for local dev)
elasticsearch.hosts: ["http://elasticsearch:9200"]

# Disable telemetry
telemetry.enabled: false
telemetry.optIn: false

# Logging
logging.appenders.default.type: console
logging.appenders.default.layout.type: pattern
logging.root.level: warn

# UI Defaults — force dark mode
uiSettings.overrides:
  "theme:darkMode": true
  "dateFormat:tz": "Browser"
  "defaultIndex": "zeek-*"
  "timepicker:refreshIntervalDefaults": '{"pause":false,"value":10000}'
  "timepicker:timeDefaults": '{"from":"now-24h","to":"now"}'

# Monitoring
monitoring.kibana.collection.enabled: false
monitoring.ui.enabled: false

# CORS / security headers
server.securityResponseHeaders.strictTransportSecurity: "max-age=0"
server.securityResponseHeaders.disableEmbedding: false
