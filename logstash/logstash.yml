# =============================================================================
# Logstash Base Configuration — NSM Stack
# =============================================================================

node.name: nsm-logstash
path.logs: /usr/share/logstash/logs

# Pipeline tuning
pipeline.workers: 2
pipeline.batch.size: 125
pipeline.batch.delay: 50

# Disable monitoring (no X-Pack license needed)
xpack.monitoring.enabled: false

# HTTP API for health checks
http.host: "0.0.0.0"
http.port: 9600
