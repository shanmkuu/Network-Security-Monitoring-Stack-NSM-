# =============================================================================
# Logstash Pipeline — NSM Stack
# Ingests Zeek JSON logs → enriches → indexes into Elasticsearch
# =============================================================================

input {
  # Watch shared volume for all Zeek log files
  file {
    path          => "/zeek-logs/*.log"
    start_position => "beginning"
    sincedb_path  => "/usr/share/logstash/data/sincedb_zeek"
    codec         => "json"
    # Tag with the log type derived from filename
    add_field     => { "[@metadata][filename]" => "%{path}" }
  }
}

filter {
  # ── Determine log type from filename ────────────────────────────────────────
  grok {
    match => { "[@metadata][filename]" => "/zeek-logs/(?<zeek_log_type>[^.]+)\.log$" }
  }

  # ── Normalize timestamp ─────────────────────────────────────────────────────
  if [ts] {
    date {
      match        => [ "ts", "ISO8601", "UNIX" ]
      target       => "@timestamp"
      remove_field => [ "ts" ]
    }
  }

  # ── GeoIP enrichment on destination IP ──────────────────────────────────────
  if [id.resp_h] {
    geoip {
      source        => "id.resp_h"
      target        => "geoip_dest"
      add_tag       => ["geoip_dest_enriched"]
    }
  }

  # ── GeoIP enrichment on source IP ───────────────────────────────────────────
  if [id.orig_h] {
    geoip {
      source        => "id.orig_h"
      target        => "geoip_src"
      add_tag       => ["geoip_src_enriched"]
    }
  }

  # ── HTTP log: flag cleartext credential submissions ──────────────────────────
  if [zeek_log_type] == "http" {
    if [method] == "POST" and [uri] =~ /(login|auth|signin|password)/ {
      mutate {
        add_tag   => ["cleartext_auth_attempt"]
        add_field => { "alert.severity" => "high" }
        add_field => { "alert.category" => "Potential Credential Theft" }
      }
    }
    mutate { add_field => { "network.protocol" => "http" } }
  }

  # ── DNS log tagging ─────────────────────────────────────────────────────────
  if [zeek_log_type] == "dns" {
    mutate { add_field => { "network.protocol" => "dns" } }
  }

  # ── SSH log tagging ─────────────────────────────────────────────────────────
  if [zeek_log_type] == "ssh" {
    mutate { add_field => { "network.protocol" => "ssh" } }
    if [auth_success] == false {
      mutate {
        add_tag   => ["ssh_auth_failure"]
        add_field => { "alert.severity" => "medium" }
      }
    }
  }

  # ── SSL/TLS log ─────────────────────────────────────────────────────────────
  if [zeek_log_type] == "ssl" {
    mutate { add_field => { "network.protocol" => "tls" } }
  }

  # ── Notice log (Zeek alerts — port scans, etc.) ──────────────────────────────
  if [zeek_log_type] == "notice" {
    mutate {
      add_field => { "network.protocol" => "zeek_notice" }
    }
    if [note] =~ /Scan/ {
      mutate {
        add_tag   => ["port_scan_detected"]
        add_field => { "alert.severity" => "critical" }
        add_field => { "alert.category" => "Port Scan" }
      }
    }
  }

  # ── Conn log: compute total bytes ────────────────────────────────────────────
  if [zeek_log_type] == "conn" {
    if [orig_bytes] and [resp_bytes] {
      ruby {
        code => "
          orig = event.get('orig_bytes').to_i
          resp = event.get('resp_bytes').to_i
          event.set('total_bytes', orig + resp)
        "
      }
    }
    mutate { add_field => { "network.protocol" => "conn" } }
  }

  # ── Clean up internal Logstash fields ────────────────────────────────────────
  mutate {
    remove_field => [ "host", "message", "path", "log", "event" ]
    add_field    => { "stack" => "nsm" }
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "zeek-%{zeek_log_type}-%{+YYYY.MM.dd}"
    # Template for index lifecycle (optional)
    manage_template => true
    template_name   => "zeek"
    template_overwrite => true
  }

  # Debug output — remove or comment out in production
  # stdout { codec => rubydebug }
}
